# MisanRD — configuración del proyecto Supabase local.
# Docs: https://supabase.com/docs/guides/local-development
project_id = "misanrd"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Site URL del proyecto HOSTED (a donde apuntan los correos de confirmación).
site_url = "https://robertochacon.github.io/MisanRD/"
additional_redirect_urls = [
  "https://robertochacon.github.io/MisanRD/",
  "https://robertochacon.github.io/MisanRD",
  "http://localhost:5173",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Plantillas de correo con la marca MisanRD.
# NOTA: personalizar templates requiere un proveedor SMTP propio (o plan de pago).
# Con el correo por defecto del tier gratuito, `supabase config push` las rechaza.
# Configura [auth.email.smtp] (ver README) y luego `supabase config push` las aplica.
[auth.email.template.confirmation]
subject = "Confirma tu cuenta en MisanRD 🎉"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Restablece tu contraseña — MisanRD"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
subject = "Tu enlace de acceso a MisanRD"
content_path = "./supabase/templates/magic_link.html"

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.portal]
verify_jwt = false
