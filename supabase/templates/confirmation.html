<!doctype html>
<html lang="es">
  <body style="margin:0;padding:0;background:#f1f5f9;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f1f5f9;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(16,30,69,0.08);">
            <tr>
              <td style="background:#0e1e45;padding:26px;text-align:center;">
                <span style="color:#ffffff;font-size:24px;font-weight:800;letter-spacing:-0.5px;">Misan<span style="color:#8eb6ff;">RD</span></span>
                <div style="color:#8eb6ff;font-size:12px;margin-top:4px;">Tus sans, más fácil</div>
              </td>
            </tr>
            <tr>
              <td style="padding:32px 28px;">
                <h1 style="margin:0 0 12px;font-size:20px;color:#0e1e45;">¡Bienvenida a MisanRD! 🎉</h1>
                <p style="margin:0 0 22px;font-size:15px;line-height:1.6;color:#334155;">
                  Confirma tu correo para empezar a administrar tus Sanes desde el celular.
                </p>
                <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 22px;">
                  <tr>
                    <td style="border-radius:12px;background:#1e63f0;">
                      <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 30px;color:#ffffff;font-size:16px;font-weight:700;text-decoration:none;border-radius:12px;">Confirmar mi cuenta</a>
                    </td>
                  </tr>
                </table>
                <p style="margin:0 0 8px;font-size:13px;color:#64748b;">O ingresa este código en la app:</p>
                <div style="font-size:26px;font-weight:800;letter-spacing:6px;color:#0e1e45;background:#eef4ff;border-radius:10px;padding:14px;text-align:center;">{{ .Token }}</div>
                <p style="margin:22px 0 0;font-size:12px;color:#94a3b8;line-height:1.5;">
                  Si no creaste esta cuenta, puedes ignorar este correo.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 28px;background:#f8fafc;text-align:center;border-top:1px solid #e2e8f0;">
                <span style="font-size:12px;color:#94a3b8;">MisanRD · Administración de Sanes 🇩🇴</span>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
